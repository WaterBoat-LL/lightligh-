        <style>
            *{
                padding: 0;
                margin: 0;
                font-family: 'Poppins', sans-serif;
            }
            #whole_place{
                position: fixed;
                top: 0;
                right: 0;
                left: 0;
                bottom: 0;
                background: red;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow-y: auto;
            }
            #whole_place ul{
                position: relative
            }
            #whole_place ul li{
                position: relative;
                text-align: center;
                display: block;
                list-style: none;
                margin: 1.5em 0;
            }
            #whole_place ul li a{
                position: relative;
                text-decoration: none;
                font-size: 3.5em;
                padding: 0 10px;
                color: black;
                font-weight: 800;
                text-transform: uppercase;
                display: inline-block;
            }
            #whole_place ul li a:before{
                content: '';
                position: absolute;
                top: 50%;
                left: 0;
                width: 100%;
                height: 8px;
                background:blue;
                transform: translateY(-50%) scaleX(0);
                transform-origin: right;
                transition: 0.5s transform;
            }
            #whole_place ul li a:hover:before{
                transform: translateY(-50%) scaleX(1);
                transform-origin: left;
                transition: 0.5s transform;
            }

        </style>
    </head>
