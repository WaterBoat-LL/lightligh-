        <title></title>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <style>
            *{
                margin: 0;
                padding: 0;
                font-family: 'Poppins' sans-serif;
            }

            .sitee{
                width: 100%;
                height: 100vh;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;

            }
            .sitee video{
                position: absolute;
                top: 0;
                left: 0;
                object-fit: cover;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }
            .sitee .content{
                position: relative;
                z-index: 1;
                
                max-width: 1000px;
                text-align: center;
                margin: 0 auto;
            }
            .content h1{
                font-weight: bold;
                color: red;
                font-size: 3.5em;
            }
            .content a{
                position:relative;
                text-decoration: none;
                font-size: 2.4em;
                color:white;
            }
            .content a :before{
                content: '';
                position: absolute;
                top :50%;
                left: 0;
                width: 100%;
                height: 5px;
                background: yellow;

                transform: translateY(-30%) scaleX(0);
                transform-origin: right;
                transition: 1s transform;
                

            }
            .content a :hover:before{
                transform: translateY(-30%) scaleX(1);
                transform-origin: left;
                transition: 1s transform;
                
            }
        </style>
    </head>
    <body>
        <!--[if lt IE 7]>
