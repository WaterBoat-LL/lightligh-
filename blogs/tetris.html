<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Tetris — TOOLBOX_Lully</title>
<style>
@font-face {
  font-family: "Alimama Agile";
  src: url("iCdxQvewlIRo.woff2") format("woff2");
}

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a1028;
  --panel: rgba(12, 19, 46, 0.78);
  --line: rgba(255, 255, 255, 0.12);
  --text: #f6f8ff;
  --muted: #98a4c7;
  --orange: #ff8c00;
  --green: #1afa29;
  --red: #d81e06;
  --purple: #a46cf4;
  --blue: #6496ff;
  --font-display: "Alimama Agile", "Orbitron", "Microsoft YaHei", sans-serif;
  --font-ui: "Alimama Agile", "Rajdhani", "Microsoft YaHei", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
  touch-action: manipulation;
}

/* 返回链接 */
.back-link {
  position: absolute;
  top: 16px;
  left: 20px;
  color: var(--muted);
  font-family: var(--font-display);
  font-size: 14px;
  text-decoration: none;
  letter-spacing: 1px;
  z-index: 50;
  transition: color 0.2s;
}
.back-link:hover {
  color: var(--orange);
}

/* ===== 规则弹窗 ===== */
.rules-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(5, 8, 20, 0.92);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.3s;
}
.rules-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.rules-card {
  background: rgba(12, 19, 46, 0.95);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 36px 40px;
  max-width: 460px;
  width: 90vw;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}
.rules-card h1 {
  font-family: var(--font-display);
  font-size: 36px;
  text-align: center;
  background: linear-gradient(135deg, var(--orange), #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
  width: 100%;
}
.rules-card h1::after {
  content: '';
  display: block;
  width: 48px;
  height: 2px;
  background: var(--orange);
  margin: 8px auto 0;
  border-radius: 1px;
}
.rules-section {
  margin-top: 20px;
}
.rules-section h3 {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--orange);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.rules-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
  font-size: 13px;
  color: var(--muted);
  line-height: 2;
}
.rules-grid kbd {
  display: inline-block;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 2px 8px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 12px;
  min-width: 24px;
  text-align: center;
}
.rules-card .start-btn {
  display: block;
  width: 100%;
  margin-top: 28px;
  padding: 14px;
  border: 1px solid var(--orange);
  border-radius: 10px;
  background: transparent;
  color: var(--orange);
  font-family: var(--font-display);
  font-size: 18px;
  cursor: pointer;
  transition: 0.2s;
  letter-spacing: 2px;
  position: relative;
}
.rules-card .start-btn::after {
  content: '';
  display: block;
  width: 0;
  height: 1px;
  background: var(--orange);
  margin: 4px auto 0;
  transition: width 0.3s;
}
.rules-card .start-btn:hover::after {
  width: 60px;
}
.rules-card .start-btn:hover {
  background: rgba(255,140,0,0.1);
}
.rules-card .start-btn:active {
  transform: scale(0.97);
}

/* ===== 主游戏布局 ===== */
.game-container {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 12px;
}

.board-wrap {
  position: relative;
  background: var(--panel);
  border: 1px solid rgba(255,140,0,0.3);
  border-radius: 10px;
  padding: 8px;
}
canvas#board {
  display: block;
  background: rgba(5,8,20,0.9);
  border-radius: 4px;
}

.board-overlay {
  position: absolute;
  inset: 0;
  border-radius: 10px;
  background: rgba(5,8,20,0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
  z-index: 10;
}
.board-overlay.show {
  opacity: 1;
  pointer-events: auto;
}
.board-overlay h2 {
  font-family: var(--font-display);
  font-size: 30px;
}
.board-overlay .sub {
  font-size: 14px;
  color: var(--muted);
}
.board-overlay button {
  padding: 12px 32px;
  border: 1px solid var(--orange);
  border-radius: 8px;
  background: transparent;
  color: var(--orange);
  font-family: var(--font-display);
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}
.board-overlay button:hover {
  background: var(--orange);
  color: var(--bg);
}
.board-overlay button:active {
  transform: scale(0.95);
}

/* ===== 中间信息栏 ===== */
.info-col {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 124px;
}
.info-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
  text-align: center;
}
.info-card .label {
  font-size: 10px;
  text-transform: uppercase;
  color: var(--muted);
  letter-spacing: 2px;
}
.info-card .value {
  font-family: var(--font-display);
  font-size: 26px;
  color: var(--orange);
  margin-top: 2px;
}
canvas#preview {
  display: block;
  background: rgba(5,8,20,0.9);
  border-radius: 4px;
  margin: 6px auto 0;
}

.pause-btn {
  display: block;
  width: 100%;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: transparent;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: 0.2s;
  position: relative;
}
.pause-btn::after {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin: 4px auto 0;
  transition: 0.2s;
}
.pause-btn:hover::after {
  width: 50px;
  background: var(--orange);
}
.pause-btn:hover {
  border-color: var(--orange);
  color: var(--orange);
}
.pause-btn:active {
  transform: scale(0.95);
}

.control-hints {
  font-size: 11px;
  color: var(--muted);
  line-height: 2.2;
}
.control-hints kbd {
  display: inline-block;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 1px 6px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 10px;
}

/* ===== 排行榜 ===== */
.leaderboard {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px;
  min-width: 180px;
  max-width: 210px;
}
.leaderboard h3 {
  font-family: var(--font-display);
  font-size: 14px;
  text-align: center;
  letter-spacing: 2px;
  color: var(--orange);
  margin-bottom: 12px;
  position: relative;
}
.leaderboard h3::after {
  content: '';
  display: block;
  width: 36px;
  height: 1px;
  background: var(--orange);
  margin: 6px auto 0;
}
.leaderboard-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.lb-row {
  display: grid;
  grid-template-columns: 26px 1fr auto;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 13px;
  transition: 0.15s;
}
.lb-row:hover {
  background: rgba(255,255,255,0.04);
}
.lb-row.me {
  background: rgba(255,140,0,0.08);
  border: 1px solid rgba(255,140,0,0.2);
}
.lb-rank {
  font-family: var(--font-display);
  font-size: 14px;
  text-align: center;
}
.lb-rank.gold { color: #ffd700; }
.lb-rank.silver { color: #c0c0c0; }
.lb-rank.bronze { color: #cd7f32; }
.lb-name {
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.lb-score {
  font-family: var(--font-display);
  color: var(--orange);
  font-size: 14px;
}
.lb-empty {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 20px 0;
}

/* ===== 移动端 D-Pad ===== */
.mobile-controls {
  display: none;
  width: 100%;
  max-width: 320px;
}
.dpad {
  position: relative;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 10px;
}
.dpad button {
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  padding: 16px 0;
  transition: 0.12s;
  position: relative;
  overflow: hidden;
}
.dpad button:active {
  background: rgba(255,140,0,0.2);
  border-color: var(--orange);
  transform: scale(0.93);
}
.dpad button::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--orange);
  opacity: 0;
  transition: opacity 0.08s;
}
.dpad button:active::after {
  opacity: 0.08;
}
.dpad .btn-wide {
  grid-column: 1 / -1;
}
.dpad .btn-rotate {
  font-size: 26px;
}

/* 手势提示 */
.gesture-hint {
  display: none;
  position: absolute;
  pointer-events: none;
  z-index: 5;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-display);
  font-size: 13px;
  text-align: center;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  transition: opacity 0.5s;
}
.gesture-hint.fade { opacity: 0; }
.gesture-hint span {
  display: block;
  font-size: 28px;
  margin-bottom: 4px;
}

/* ===== 排行榜折叠 ===== */
.lb-toggle {
  display: none;
  width: 100%;
  text-align: center;
  padding: 8px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-display);
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 2px;
  position: relative;
}
.lb-toggle::after {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: var(--orange);
  margin: 4px auto 0;
}
.lb-toggle .arrow {
  display: inline-block;
  transition: transform 0.25s;
  margin-left: 6px;
}
.lb-toggle.open .arrow {
  transform: rotate(180deg);
}

/* ===== 响应式 ===== */
@media (max-width: 750px) {
  body {
    align-items: flex-start;
    padding: 8px;
  }
  .game-container {
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0;
    width: 100%;
  }

  /* 游戏板撑满宽度 */
  .board-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 6px;
  }
  canvas#board {
    width: min(100%, 300px);
    height: auto;
    aspect-ratio: 10 / 20;
  }

  /* 信息栏横排 */
  .info-col {
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    align-items: stretch;
    gap: 8px;
    width: 100%;
    max-width: 320px;
  }
  .info-col .info-card {
    flex: 1;
    min-width: 60px;
    padding: 8px 6px;
  }
  .info-col .info-card .value { font-size: 20px; }
  .info-col .pause-btn {
    flex: unset;
    width: auto;
    padding: 8px 16px;
    font-size: 13px;
  }
  .control-hints { display: none; }
  canvas#preview { width: 60px; height: auto; margin: 2px auto 0; }

  /* D-Pad 显示 */
  .mobile-controls { display: block; }

  /* 排行榜折叠 */
  .leaderboard { display: none; min-width: unset; max-width: unset; width: 100%; max-width: 320px; }
  .leaderboard.expanded { display: block; }
  .lb-toggle { display: block; max-width: 320px; }

  /* 手势提示显示 */
  .gesture-hint { display: block; }
}

/* ===== 更小屏幕 ===== */
@media (max-width: 380px) {
  .dpad button { padding: 14px 0; font-size: 18px; }
  .dpad .btn-rotate { font-size: 22px; }
}
</style>
</head>
<body>

<!-- 规则弹窗 -->
<div class="rules-overlay" id="rulesOverlay">
  <div class="rules-card">
    <h1>游戏规则</h1>
    <div class="rules-section">
      <h3>电脑端操作</h3>
      <div class="rules-grid">
        <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd></span><span>左右移动</span>
        <span><kbd>&darr;</kbd></span><span>软降</span>
        <span><kbd>&uarr;</kbd></span><span>旋转</span>
        <span><kbd>Space</kbd></span><span>硬降</span>
        <span><kbd>P</kbd></span><span>暂停</span>
      </div>
    </div>
    <div class="rules-section mobile-only" style="display:none">
      <h3>移动端操作</h3>
      <div class="rules-grid">
        <span>画板滑动</span><span>左右移 / 下滑硬降</span>
        <span>轻点画板</span><span>旋转</span>

      </div>

    <button class="start-btn" onclick="startGame()">开始游戏</button>
  </div>
</div>

<!-- 游戏主界面 -->
<a class="back-link" href="index.html">&#8592; 返回</a>
<div class="game-container" id="gameContainer" style="display:none">
  <div class="board-wrap">
    <canvas id="board"></canvas>
    <div class="gesture-hint" id="gestureHint">
      <span>&#9756; &#9758;</span>
      滑动 / 点击
    </div>
    <div class="board-overlay" id="boardOverlay">
      <h2 id="overlayTitle">PAUSED</h2>
      <p class="sub" id="overlaySub"></p>
      <button id="overlayBtn" onclick="handleOverlayBtn()">继续</button>
    </div>
  </div>

  <div class="info-col">
    <div class="info-card">
      <p class="label">得分</p>
      <p class="value" id="score">0</p>
    </div>
    <div class="info-card">
      <p class="label">行数</p>
      <p class="value" id="lines">0</p>
    </div>
    <div class="info-card">
      <p class="label">预显</p>
      <canvas id="preview" width="100" height="80"></canvas>
    </div>
    <button class="pause-btn" onclick="togglePause()" id="pauseBtn">暂停</button>
    <div class="control-hints">
      <p><kbd>&larr;</kbd><kbd>&rarr;</kbd> 移动</p>
      <p><kbd>&darr;</kbd> 软降 · <kbd>&uarr;</kbd> 旋转</p>
      <p><kbd>Space</kbd> 硬降</p>
    </div>
  </div>

  <div class="leaderboard" id="leaderboardPanel">
    <h3>排行榜</h3>
    <div class="leaderboard-list" id="lbList">
      <p class="lb-empty">加载中...</p>
    </div>
  </div>
</div>

<!-- 移动端 D-Pad -->
<div class="mobile-controls">
  <div class="dpad">
    <button id="btnLeft"   onpointerdown="startRepeat('left')"  onpointerup="stopRepeat()" onpointerleave="stopRepeat()" onpointercancel="stopRepeat()">&#9664;</button>
    <button id="btnRotate" class="btn-rotate" onpointerdown="rotate()">&#8635;</button>
    <button id="btnRight"  onpointerdown="startRepeat('right')" onpointerup="stopRepeat()" onpointerleave="stopRepeat()" onpointercancel="stopRepeat()">&#9654;</button>
    <button id="btnDown"   onpointerdown="startRepeat('down')"  onpointerup="stopRepeat()" onpointerleave="stopRepeat()" onpointercancel="stopRepeat()">&#9660;</button>
    <button id="btnDrop"   class="btn-wide" onpointerdown="hardDrop()">硬 降</button>
  </div>
</div>

<!-- 排行榜折叠按钮（移动端） -->
<button class="lb-toggle" id="lbToggle" onclick="toggleLeaderboard()">
  排行榜 <span class="arrow">&#9660;</span>
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============ 检测移动端，显示对应规则 ============
if (window.matchMedia('(max-width: 750px)').matches) {
  document.querySelector('.mobile-only').style.display = 'block';
}

// ============ Supabase ============
const SUPABASE_URL = 'https://lzizinzjvwckecfjfxaw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6aXppbnpqdndja2VjZmpmeGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MzU1NzksImV4cCI6MjA5NTUxMTU3OX0.mcqrLghGQTDYiqQVWZF2-mYGqLzB2lOHyGe1JbcOBLQ';

let supabase, currentUser;

function initSupabase() {
  if (window.supabase && window.supabase.createClient) {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) currentUser = data.session.user;
      loadLeaderboard();
    });
  } else {
    document.getElementById('lbList').innerHTML = '<p class="lb-empty">排行榜暂不可用</p>';
  }
}

async function loadLeaderboard() {
  const list = document.getElementById('lbList');
  try {
    const { data, error } = await supabase
      .from('tetris_scores')
      .select('*')
      .order('score', { ascending: false })
      .limit(10);
    if (error) {
      if (error.code === '42P01') list.innerHTML = '<p class="lb-empty">排行榜即将上线</p>';
      else list.innerHTML = '<p class="lb-empty">加载失败</p>';
      return;
    }
    if (!data || !data.length) {
      list.innerHTML = '<p class="lb-empty">暂无记录，快来挑战！</p>';
      return;
    }
    list.innerHTML = data.map((r, i) => {
      let rankClass = '', rankDisplay = i + 1;
      if (i === 0) { rankClass = 'gold'; rankDisplay = '👑'; }
      else if (i === 1) rankClass = 'silver';
      else if (i === 2) rankClass = 'bronze';
      const isMe = currentUser && r.user_id === currentUser.id;
      const name = r.display_name || '匿名玩家';
      return '<div class="lb-row' + (isMe ? ' me' : '') + '">' +
        '<span class="lb-rank ' + rankClass + '">' + rankDisplay + '</span>' +
        '<span class="lb-name" title="' + name + '">' + name + '</span>' +
        '<span class="lb-score">' + r.score.toLocaleString() + '</span></div>';
    }).join('');
  } catch (e) { list.innerHTML = '<p class="lb-empty">加载失败</p>'; }
}

async function submitScore(score, lines) {
  if (!supabase || !currentUser) return;
  const displayName = currentUser.user_metadata?.display_name || currentUser.email?.split('@')[0] || '玩家';
  try {
    await supabase.from('tetris_scores').insert({ user_id: currentUser.id, display_name: displayName, score, lines });
    loadLeaderboard();
  } catch (e) { console.warn('提交分数失败:', e.message); }
}

function toggleLeaderboard() {
  const panel = document.getElementById('leaderboardPanel');
  const btn = document.getElementById('lbToggle');
  panel.classList.toggle('expanded');
  btn.classList.toggle('open');
  if (panel.classList.contains('expanded')) {
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ============ 游戏逻辑 ============
const COLS = 10, ROWS = 20, BLOCK = 30;
const boardEl = document.getElementById('board');
const previewEl = document.getElementById('preview');
const scoreEl = document.getElementById('score');
const linesEl = document.getElementById('lines');
const boardOverlay = document.getElementById('boardOverlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const overlayBtn = document.getElementById('overlayBtn');
const pauseBtn = document.getElementById('pauseBtn');
const rulesOverlay = document.getElementById('rulesOverlay');
const gameContainer = document.getElementById('gameContainer');
const gestureHint = document.getElementById('gestureHint');

boardEl.width = COLS * BLOCK;
boardEl.height = ROWS * BLOCK;
const ctx = boardEl.getContext('2d');
const pctx = previewEl.getContext('2d');

const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]]
};

const COLORS = {
  I: '#1afa29', O: '#f4ea2a', T: '#a46cf4',
  S: '#d81e06', Z: '#6496ff', J: '#f0883e', L: '#ff8c00'
};

let grid, piece, nextPiece, score, lines, gameOver, paused, interval, dropSpeed;
let gestureUsed = false;

function createGrid() { return Array.from({ length: ROWS }, () => Array(COLS).fill(0)); }

function randomPiece() {
  const names = Object.keys(SHAPES);
  const name = names[Math.floor(Math.random() * names.length)];
  return { name, shape: SHAPES[name].map(r => [...r]), x: Math.floor((COLS - SHAPES[name][0].length) / 2), y: 0 };
}

function drawBlock(context, x, y, color, size) {
  context.fillStyle = color;
  context.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
  context.fillStyle = 'rgba(255,255,255,0.22)';
  context.fillRect(x * size + 1, y * size + 1, size - 2, 3);
  context.fillRect(x * size + 1, y * size + 1, 3, size - 2);
  context.fillStyle = 'rgba(0,0,0,0.25)';
  context.fillRect(x * size + 1, y * size + size - 4, size - 2, 3);
  context.fillRect(x * size + size - 4, y * size + 1, 3, size - 2);
}

function drawBoard() {
  ctx.clearRect(0, 0, boardEl.width, boardEl.height);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 0.5;
  for (let x = 0; x < COLS; x++) { ctx.beginPath(); ctx.moveTo(x * BLOCK, 0); ctx.lineTo(x * BLOCK, ROWS * BLOCK); ctx.stroke(); }
  for (let y = 0; y < ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * BLOCK); ctx.lineTo(COLS * BLOCK, y * BLOCK); ctx.stroke(); }
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) if (grid[y][x]) drawBlock(ctx, x, y, grid[y][x], BLOCK);
  if (piece && !gameOver) {
    piece.shape.forEach((row, dy) => row.forEach((cell, dx) => {
      if (cell) drawBlock(ctx, piece.x + dx, piece.y + dy, COLORS[piece.name], BLOCK);
    }));
  }
}

function drawPreview() {
  pctx.clearRect(0, 0, previewEl.width, previewEl.height);
  if (!nextPiece) return;
  const s = nextPiece.shape, w = s[0].length, h = s.length, size = 18;
  const ox = (previewEl.width - w * size) / 2, oy = (previewEl.height - h * size) / 2;
  s.forEach((row, dy) => row.forEach((cell, dx) => {
    if (cell) { pctx.fillStyle = COLORS[nextPiece.name]; pctx.fillRect(ox + dx * size + 1, oy + dy * size + 1, size - 2, size - 2); }
  }));
}

function collides(p) {
  return p.shape.some((row, dy) => row.some((cell, dx) => {
    if (!cell) return false;
    const nx = p.x + dx, ny = p.y + dy;
    return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny][nx]);
  }));
}

function lock() {
  piece.shape.forEach((row, dy) => row.forEach((cell, dx) => {
    if (cell) { const ny = piece.y + dy, nx = piece.x + dx; if (ny < 0) { endGame(); return; } grid[ny][nx] = COLORS[piece.name]; }
  }));
  if (gameOver) return;
  clearLines();
  piece = nextPiece; nextPiece = randomPiece();
  if (collides(piece)) endGame();
}

function clearLines() {
  let cleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (grid[y].every(c => c)) { grid.splice(y, 1); grid.unshift(Array(COLS).fill(0)); y++; cleared++; }
  }
  if (cleared > 0) {
    const pts = [0, 100, 300, 500, 800];
    score += pts[cleared] || cleared * 200;
    lines += cleared;
    scoreEl.textContent = score; linesEl.textContent = lines;
    dropSpeed = Math.max(60, 500 - lines * 22);
    clearInterval(interval); interval = setInterval(tick, dropSpeed);
  }
}

function endGame() {
  gameOver = true; clearInterval(interval);
  overlayTitle.textContent = '游戏结束';
  overlaySub.textContent = '最终得分: ' + score.toLocaleString();
  overlayBtn.textContent = '再来一局';
  boardOverlay.classList.add('show');
  submitScore(score, lines);
}

function tick() {
  if (gameOver || paused) return;
  piece.y++;
  if (collides(piece)) { piece.y--; lock(); drawPreview(); }
  drawBoard();
}

function hardDrop() {
  if (gameOver || paused) return;
  let dropped = 0;
  while (!collides({ ...piece, y: piece.y + 1 })) { piece.y++; dropped++; }
  score += dropped * 2; scoreEl.textContent = score;
  lock(); drawPreview(); drawBoard();
}

function rotate() {
  if (gameOver || paused) return;
  const rotated = piece.shape[0].map((_, i) => piece.shape.map(r => r[i]).reverse());
  const kicks = [{ ...piece, shape: rotated }, { ...piece, shape: rotated, x: piece.x - 1 }, { ...piece, shape: rotated, x: piece.x + 1 }];
  for (const k of kicks) { if (!collides(k)) { piece.shape = k.shape; piece.x = k.x; break; } }
  drawBoard();
}

function move(dx) {
  if (gameOver || paused) return;
  if (!collides({ ...piece, x: piece.x + dx })) piece.x += dx;
  drawBoard();
}

function moveDown() {
  if (gameOver || paused) return;
  piece.y++;
  if (collides(piece)) { piece.y--; lock(); drawPreview(); }
  else { score += 1; scoreEl.textContent = score; }
  drawBoard();
}

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  if (paused) {
    overlayTitle.textContent = '暂停中'; overlaySub.textContent = '';
    overlayBtn.textContent = '继续'; boardOverlay.classList.add('show');
    pauseBtn.textContent = '继续';
  } else { boardOverlay.classList.remove('show'); pauseBtn.textContent = '暂停'; }
}

function handleOverlayBtn() { gameOver ? restart() : togglePause(); }

function restart() {
  clearInterval(interval);
  grid = createGrid(); piece = randomPiece(); nextPiece = randomPiece();
  score = 0; lines = 0; gameOver = false; paused = false; dropSpeed = 500;
  scoreEl.textContent = '0'; linesEl.textContent = '0';
  boardOverlay.classList.remove('show'); pauseBtn.textContent = '暂停';
  interval = setInterval(tick, dropSpeed);
  drawBoard(); drawPreview();
  // 重置手势提示
  gestureUsed = false; gestureHint.classList.remove('fade');
}

function startGame() {
  rulesOverlay.classList.add('hidden');
  gameContainer.style.display = 'flex';
  restart();
}

// ============ 键盘 ============
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); move(1); }
  if (e.key === 'ArrowDown') { e.preventDefault(); moveDown(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); rotate(); }
  if (e.key === ' ') { e.preventDefault(); hardDrop(); }
  if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); }
});

// ============ 移动端：按住连续移动 ============
let repeatTimer = null, repeatAction = null;

function startRepeat(action) {
  if (gameOver || paused) return;
  stopRepeat(); repeatAction = action;
  if (action === 'left') move(-1);
  else if (action === 'right') move(1);
  else if (action === 'down') moveDown();
  repeatTimer = setInterval(() => {
    if (gameOver || paused) { stopRepeat(); return; }
    if (repeatAction === 'left') move(-1);
    else if (repeatAction === 'right') move(1);
    else if (repeatAction === 'down') moveDown();
  }, 50);
}

function stopRepeat() { if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; } repeatAction = null; }

// 隐藏手势提示
function hideGestureHint() {
  if (!gestureUsed) {
    gestureUsed = true;
    gestureHint.classList.add('fade');
  }
}

// ============ 移动端：画板滑动手势 ============
let swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;

boardEl.addEventListener('pointerdown', e => {
  swipeStartX = e.clientX; swipeStartY = e.clientY; swipeStartTime = Date.now();
});

boardEl.addEventListener('pointerup', e => {
  hideGestureHint();
  if (gameOver || paused) return;
  const dx = e.clientX - swipeStartX, dy = e.clientY - swipeStartY, dt = Date.now() - swipeStartTime;

  // 点击画板 → 旋转
  if (Math.abs(dx) < 15 && Math.abs(dy) < 15 && dt < 350) { rotate(); return; }

  // 下滑 → 硬降
  if (dy > 40 && dy > Math.abs(dx) * 1.3) { hardDrop(); return; }

  // 左右滑 → 移动（每滑动 25px 移动一格）
  if (Math.abs(dx) > 25 && Math.abs(dx) > Math.abs(dy) * 1.3) {
    const steps = Math.round(Math.abs(dx) / 25);
    for (let i = 0; i < steps; i++) move(dx > 0 ? 1 : -1);
  }
});

boardEl.addEventListener('pointermove', e => {
  // 拖动中下滑 → 持续软降（手指不离开画板持续下拉）
  if (gameOver || paused) return;
  const dy = e.clientY - swipeStartY;
  if (dy > 60 && !repeatTimer) {
    startRepeat('down');
  }
});

// 防止双击缩放
document.addEventListener('touchstart', e => {
  if (e.target.closest('button') || e.target === boardEl) {
    if (e.touches.length === 1) e.preventDefault();
  }
}, { passive: false });

// ============ 初始化 ============
initSupabase();
</script>
</body>
</html>
