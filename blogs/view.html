<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AI Helper</title>
    <style>
      * {
        box-sizing: border-box;
        scrollbar-width: none;
      }

      *::-webkit-scrollbar {
        display: none;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden !important;
        overscroll-behavior: none;
        background: #050814;
      }

      body {
        border: 1px solid rgba(255, 165, 0, 0.2);
        touch-action: none;
      }

      #agent-scale-host {
        --agent-scale: 0.88;
        width: calc(100% / var(--agent-scale));
        height: calc(100% / var(--agent-scale));
        overflow: hidden;
        transform: scale(var(--agent-scale));
        transform-origin: left top;
      }

      #agent-scale-host > * {
        max-width: none;
      }

      .agent-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: rgba(255, 165, 0, 0.6);
        font-family: monospace;
        font-size: 14px;
      }

      .agent-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: rgba(255, 100, 100, 0.8);
        font-family: monospace;
        font-size: 14px;
        text-align: center;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div id="agent-scale-host"></div>
    <div id="agent-loading" class="agent-loading">Loading agent...</div>
    <script src="https://agi-dev-platform-web.cdn.bcebos.com/ai_apaas/embed/output/embedFullSDK.js?responseExpires=0&t=1779503604078"></script>
    <script>
      const APP_ID = '__BAIDU_AGENT_APP_ID__';
      const CODE = '__BAIDU_AGENT_CODE__';
      const host = document.getElementById('agent-scale-host');
      const loadingEl = document.getElementById('agent-loading');

      const moveIntoHost = (node) => {
        if (node.nodeType === Node.ELEMENT_NODE && node !== host && node.tagName !== 'SCRIPT') {
          host.appendChild(node);
        }
      };

      new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach(moveIntoHost);
        });
      }).observe(document.body, { childList: true });

      window.addEventListener('wheel', (event) => { event.preventDefault(); }, { passive: false, capture: true });
      window.addEventListener('touchmove', (event) => { event.preventDefault(); }, { passive: false, capture: true });

      try {
        loadingEl.remove();
        new EmbedWebSDK({
          appId: APP_ID,
          code: CODE,
          container: host,
          renderConfig: { width: '100%', height: '100%' }
        });
      } catch (e) {
        console.error('[Agent] 初始化失败:', e);
        loadingEl.className = 'agent-error';
        loadingEl.innerHTML = '<p>智能体加载失败</p><p style="font-size:12px;opacity:0.6;margin-top:8px;">' + e.message + '</p>';
      }
    </script>
  </body>
</html>
